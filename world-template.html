<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AiaCon World</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Fira Code', monospace; }
        #chat-container { position: absolute; bottom: 10px; left: 10px; right: 10px; background: rgba(0,0,0,0.7); border-radius: 8px; padding: 5px; color: white; max-height: 200px; overflow-y: auto; font-size: 12px; z-index: 10; pointer-events: none; }
        #chat-input { position: absolute; bottom: 10px; left: 60px; right: 60px; background: rgba(0,0,0,0.8); border: none; color: white; padding: 8px; border-radius: 20px; outline: none; pointer-events: auto; z-index: 20; }
        #send-btn { position: absolute; bottom: 10px; right: 10px; background: #5B4BFF; border: none; color: white; padding: 8px 16px; border-radius: 20px; cursor: pointer; pointer-events: auto; z-index: 20; }
    </style>
</head>
<body>
    <div id="chat-container"></div>
    <input id="chat-input" type="text" placeholder="Type a message..." />
    <button id="send-btn">Send</button>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "ably": "https://cdn.ably.com/lib/ably.min.js"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { Ably } from 'ably';

        // --- Ably setup (free tier) – replace with your own API key ---
        const ABLY_API_KEY = 'YOUR_ABLY_API_KEY'; // Get from ably.com
        const client = new Ably.Realtime({ key: ABLY_API_KEY });
        const channel = client.channels.get('aiacon-world');
        
        // --- Three.js scene ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0A0A14);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 5, 10);
        camera.lookAt(0, 0, 0);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        
        // Ground
        const gridHelper = new THREE.GridHelper(20, 20, 0x9F7AEA, 0x333333);
        scene.add(gridHelper);
        const planeGeometry = new THREE.PlaneGeometry(20, 20);
        const planeMaterial = new THREE.MeshStandardMaterial({ color: 0x1A1A2E, side: THREE.DoubleSide });
        const plane = new THREE.Mesh(planeGeometry, planeMaterial);
        plane.rotation.x = -Math.PI / 2;
        plane.position.y = -0.5;
        scene.add(plane);
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(5, 10, 7);
        scene.add(directionalLight);
        
        // Simple cube as avatar
        const geometry = new THREE.BoxGeometry(0.8, 0.8, 0.8);
        const material = new THREE.MeshStandardMaterial({ color: 0x5B4BFF });
        const myAvatar = new THREE.Mesh(geometry, material);
        myAvatar.position.y = 0;
        scene.add(myAvatar);
        
        // Store other players' avatars
        const otherPlayers = {};
        
        // Camera follow (third person)
        const cameraOffset = new THREE.Vector3(-5, 3, 5);
        
        // Movement controls (WASD)
        const keyState = { w: false, s: false, a: false, d: false };
        const speed = 5;
        window.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'KeyW': keyState.w = true; break;
                case 'KeyS': keyState.s = true; break;
                case 'KeyA': keyState.a = true; break;
                case 'KeyD': keyState.d = true; break;
            }
        });
        window.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'KeyW': keyState.w = false; break;
                case 'KeyS': keyState.s = false; break;
                case 'KeyA': keyState.a = false; break;
                case 'KeyD': keyState.d = false; break;
            }
        });
        
        function updatePosition(deltaTime) {
            let moveX = 0, moveZ = 0;
            if (keyState.w) moveZ -= speed * deltaTime;
            if (keyState.s) moveZ += speed * deltaTime;
            if (keyState.a) moveX -= speed * deltaTime;
            if (keyState.d) moveX += speed * deltaTime;
            myAvatar.position.x += moveX;
            myAvatar.position.z += moveZ;
            // Keep inside bounds
            myAvatar.position.x = Math.min(Math.max(myAvatar.position.x, -9), 9);
            myAvatar.position.z = Math.min(Math.max(myAvatar.position.z, -9), 9);
            // Update camera
            camera.position.copy(myAvatar.position.clone().add(cameraOffset));
            camera.lookAt(myAvatar.position);
        }
        
        // Send my position to Ably
        let lastSendTime = 0;
        function sendPosition() {
            const now = Date.now();
            if (now - lastSendTime > 50) { // 20 fps
                lastSendTime = now;
                channel.publish('position', {
                    userId: window.userId,
                    username: window.username,
                    x: myAvatar.position.x,
                    z: myAvatar.position.z
                });
            }
        }
        
        // Receive other players' positions
        channel.subscribe('position', (message) => {
            const { userId, username, x, z } = message.data;
            if (userId === window.userId) return;
            if (!otherPlayers[userId]) {
                const geom = new THREE.BoxGeometry(0.8, 0.8, 0.8);
                const mat = new THREE.MeshStandardMaterial({ color: 0x9F7AEA });
                const avatar = new THREE.Mesh(geom, mat);
                scene.add(avatar);
                otherPlayers[userId] = { mesh: avatar, username };
            }
            otherPlayers[userId].mesh.position.set(x, 0, z);
        });
        
        // Chat handling
        channel.subscribe('chat', (message) => {
            const { username, text } = message.data;
            const chatDiv = document.getElementById('chat-container');
            const msgDiv = document.createElement('div');
            msgDiv.innerHTML = `<b>@${username}</b>: ${text}`;
            chatDiv.appendChild(msgDiv);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        });
        
        window.broadcastChat = (text) => {
            channel.publish('chat', { username: window.username, text });
            // Also show locally
            const chatDiv = document.getElementById('chat-container');
            const msgDiv = document.createElement('div');
            msgDiv.innerHTML = `<b>@${window.username}</b>: ${text}`;
            chatDiv.appendChild(msgDiv);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        };
        
        // UI chat input
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        sendBtn.addEventListener('click', () => {
            if (chatInput.value.trim()) {
                window.broadcastChat(chatInput.value);
                chatInput.value = '';
            }
        });
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendBtn.click();
        });
        
        // Animation loop
        let lastTime = performance.now();
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            updatePosition(delta);
            sendPosition();
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate();
        
        // On load, send join message
        window.addEventListener('load', () => {
            channel.publish('chat', { username: 'System', text: `${window.username} joined the world` });
        });
    </script>
</body>
</html>
