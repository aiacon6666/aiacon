version: 2.1

orbs:
  node: circleci/node@5.2.0

jobs:
  build-android:
    docker:
      - image: cimg/android:2024.01
    resource_class: large
    steps:
      - checkout
      - node/install:
          node-version: '20.14.0'
      - run:
          name: Install dependencies
          command: npm install --legacy-peer-deps
      - run:
          name: Install Expo CLI
          command: npm install -g expo-cli
      - run:
          name: Prebuild Android native folder
          command: npx expo prebuild --platform android --clean --no-install
      - run:
          name: Configure Gradle for CI
          command: |
            # Increase JVM heap to 4 GB (default 2 GB OOMs on Hermes AAR Jetifier)
            sed -i 's/org.gradle.jvmargs=.*/org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m/' android/gradle.properties
            # Build arm64-v8a only — all modern Android phones, cuts compile time significantly
            sed -i 's/reactNativeArchitectures=.*/reactNativeArchitectures=arm64-v8a/' android/gradle.properties
            # Skip Jetifying hermes-android — it's already AndroidX-clean, Jetifier OOMs on it
            echo "android.jetifier.ignorelist=hermes-android" >> android/gradle.properties
      - run:
          name: Install Ninja (required by expo-av CMake build)
          command: sudo apt-get install -y ninja-build
      - run:
          name: Build APK with Gradle
          command: |
            cd android
            chmod +x gradlew
            ./gradlew assembleDebug --no-daemon
      - store_artifacts:
          path: android/app/build/outputs/apk/debug/app-debug.apk
          destination: aiacon-debug.apk

workflows:
  build:
    jobs:
      - build-android:
          filters:
            branches:
              only:
                - main
                - chunk/fix-pngjs-prebuild-android
