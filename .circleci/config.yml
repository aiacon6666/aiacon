version: 2.1

orbs:
  node: circleci/node@5.2.0

jobs:
  build-android:
    docker:
      - image: cimg/android:2024.01
    resource_class: large
    steps:
      - checkout
      - node/install:
          node-version: '20.14.0'
      - run:
          name: Install dependencies
          command: npm install --legacy-peer-deps
      - run:
          name: Install Expo CLI
          command: npm install -g expo-cli
      - run:
          name: Prebuild Android native folder
          command: npx expo prebuild --platform android --clean --no-install
      - run:
          name: Build APK with Gradle
          command: |
            cd android
            chmod +x gradlew
            ./gradlew assembleDebug --no-daemon
      - store_artifacts:
          path: android/app/build/outputs/apk/debug/app-debug.apk
          destination: aiacon-debug.apk

workflows:
  build:
    jobs:
      - build-android:
          filters:
            branches:
              only:
                - main
                - chunk/fix-pngjs-prebuild-android
