version: 2.1

orbs:
  node: circleci/node@5.1.0

jobs:
  build-android:
    docker:
      - image: cimg/android:2024.04.1
    resource_class: large
    steps:
      - checkout
      - node/install:
          node-version: 'lts'
      - node/install-packages:
          pkg-manager: npm
      - run:
          name: Install Expo and EAS CLI
          command: npm install -g expo-cli eas-cli
      - run:
          name: Build Android APK locally
          command: eas build --platform android --profile preview --non-interactive --local
      - run:
          name: Collect build artifacts
          command: mkdir -p build && mv *.apk build/ 2>/dev/null || mv *.aab build/ 2>/dev/null || true
          when: always
      - store_artifacts:
          path: ./build
          destination: android-build

workflows:
  version: 2
  build:
    jobs:
      - build-android
