version: 2.1

orbs:
  node: circleci/node@5.1.0

jobs:
  build-android:
    docker:
      - image: cimg/android:2024.04
    resource_class: large
    steps:
      - checkout
      - node/install:
          node-version: '20'
      - node/install-packages:
          pkg-manager: npm
      - run:
          name: Install Android SDK components
          command: |
            yes | sdkmanager --licenses || true
            sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;27.1.12297006"
      - run:
          name: Build Android APK
          command: cd android && ./gradlew assembleRelease --no-daemon
      - store_artifacts:
          path: android/app/build/outputs/apk/release
          destination: android-build

workflows:
  version: 2
  build:
    jobs:
      - build-android
