version: 2.1

orbs:
  node: circleci/node@5.1.0

jobs:
  build-android:
    docker:
      - image: cimg/node:20.19
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: npm
      - run:
          name: Install Expo and EAS CLI
          command: npm install -g expo-cli eas-cli
      - run:
          name: Build Android APK
          command: eas build --platform android --profile preview --non-interactive --wait
      - store_artifacts:
          path: ./build
          destination: android-build

workflows:
  version: 2
  build:
    jobs:
      - build-android
